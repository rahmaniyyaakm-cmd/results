<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result Management System | Rahmaniyya Public School</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --navy: #001f3f; --white: #ffffff; --gray: #f8f9fa; --border: #dee2e6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background-color: var(--white); color: #333; }
        header, footer { background-color: var(--navy); color: var(--white); text-align: center; padding: 1.5rem; }
        main { min-height: 85vh; display: flex; flex-direction: column; align-items: center; padding: 2rem; position: relative; }
        .logo-watermark { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.05; z-index: -1; width: 350px; }
        .card { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); width: 100%; max-width: 600px; text-align: center; margin-bottom: 2rem; }
        .hidden { display: none; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid var(--border); border-radius: 5px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-primary { background: var(--navy); color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-link { background: none; color: var(--navy); text-decoration: underline; font-size: 0.9rem; }
        #countdown { font-size: 2.5rem; font-weight: 800; color: var(--navy); margin: 15px 0; }
        .admin-nav { display: flex; gap: 10px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background: var(--navy); color: white; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 1.4rem; font-weight: bold;">RAHMANIYYA PUBLIC SCHOOL</div>
    <div style="font-size: 0.9rem; letter-spacing: 2px;">AKAMPADAM</div>
</header>

<main>
    <img src="image_856095.png" class="logo-watermark" alt="Logo">

    <!-- 1. PUBLIC VIEW: TIMER -->
    <div id="view-timer" class="card">
        <h3>RESULTS ANNOUNCEMENT</h3>
        <div id="countdown">00:00:00</div>
        <button class="btn btn-link" onclick="showSection('view-login-admin')">Admin Login</button>
    </div>

    <!-- 2. PUBLIC VIEW: STUDENT LOGIN -->
    <div id="view-login-student" class="card hidden">
        <h2>Check Result</h2>
        <input type="text" id="stu-adm" placeholder="Admission Number">
        <input type="date" id="stu-dob">
        <button class="btn btn-primary" onclick="studentLogin()">VIEW MARK SHEET</button>
        <button class="btn btn-link" onclick="showSection('view-login-admin')">Admin Login</button>
    </div>

    <!-- 3. ADMIN LOGIN -->
    <div id="view-login-admin" class="card hidden">
        <h2>Admin Authentication</h2>
        <input type="text" id="admin-id" placeholder="Login ID">
        <input type="password" id="admin-pass" placeholder="Password">
        <button class="btn btn-primary" onclick="adminLogin()">LOGIN</button>
        <button class="btn btn-link" onclick="checkTimerStatus()">Back to Portal</button>
    </div>

    <!-- 4. ADMIN DASHBOARD -->
    <div id="view-admin-dash" class="card hidden" style="max-width: 900px;">
        <h2>Admin Dashboard</h2>
        <div class="admin-nav">
            <button class="btn btn-primary" onclick="downloadTemplate()">Download Excel Template</button>
            <button class="btn btn-success" onclick="document.getElementById('excel-upload').click()">Upload Results</button>
            <input type="file" id="excel-upload" class="hidden" accept=".xlsx, .xls" onchange="handleExcel(event)">
        </div>
        <hr>
        <h3>Set Publish Schedule</h3>
        <input type="datetime-local" id="sched-time">
        <button class="btn btn-primary" onclick="saveSchedule()">Save Schedule</button>
        <button class="btn btn-link" style="color:red" onclick="logout()">Logout</button>
    </div>

    <!-- 5. RESULT DISPLAY -->
    <div id="view-result" class="card hidden" style="max-width: 800px;">
        <div id="result-sheet"></div>
        <button class="btn btn-primary" onclick="window.print()">Download as PDF</button>
        <button class="btn btn-link" onclick="location.reload()">Back</button>
    </div>
</main>

<footer>&copy; 2026 Rahmaniyya Public School Akampadam</footer>

<script>
    // --- INITIALIZATION ---
    const _URL = 'https://wyxgixlqgwjexlkwccpf.supabase.co';
    const _KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind5eGdpeGxxZ3dqZXhsa3djY3BmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNDEyNzIsImV4cCI6MjA5MzkxNzI3Mn0.udgw8JRxGNUdcT9mY7_hsnIwPtheNKm3qhCm_Y0GUec';
    const supabase = supabase.createClient(_URL, _KEY);

    let publishTimestamp = null;

    // --- NAVIGATION ---
    function showSection(id) {
        ['view-timer', 'view-login-student', 'view-login-admin', 'view-admin-dash', 'view-result'].forEach(s => {
            document.getElementById(s).classList.add('hidden');
        });
        document.getElementById(id).classList.remove('hidden');
    }

    // --- AUTHENTICATION ---
    function adminLogin() {
        const id = document.getElementById('admin-id').value;
        const pw = document.getElementById('admin-pass').value;
        if(id === 'admin' && pw === 'Rahmaniyya@2004') {
            showSection('view-admin-dash');
        } else {
            alert('Access Denied: Invalid Credentials');
        }
    }

    function logout() { location.reload(); }

    // --- TIMER LOGIC ---
    async function checkTimerStatus() {
        // Fetch schedule from Supabase (assuming a 'settings' table exists)
        const { data } = await supabase.from('settings').select('value').eq('key', 'publish_time').single();
        if(data) {
            publishTimestamp = new Date(data.value).getTime();
            startCountdown();
        } else {
            showSection('view-login-student'); // Default if no timer set
        }
    }

    function startCountdown() {
        const timer = setInterval(() => {
            const now = new Date().getTime();
            const diff = publishTimestamp - now;
            if(diff <= 0) {
                clearInterval(timer);
                showSection('view-login-student');
            } else {
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                document.getElementById('countdown').innerText = `${h}h ${m}m ${s}s`;
            }
        }, 1000);
    }

    async function saveSchedule() {
        const val = document.getElementById('sched-time').value;
        const { error } = await supabase.from('settings').upsert({ key: 'publish_time', value: val });
        if(!error) alert('Schedule Updated!');
    }

    // --- DATA HANDLING ---
    function downloadTemplate() {
        const ws = XLSX.utils.json_to_sheet([{
            admission_no: "2025/001", dob: "2015-06-15", name: "Student Name", grade_level: "Grade I",
            english: 0, malayalam: 0, hindhi: 0, arabi: 0, maths: 0, evs: 0, gk: 0, it: 0, science: 0, social_science: 0
        }]);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Results");
        XLSX.writeFile(wb, "Result_Template.xlsx");
    }

    function handleExcel(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = async (event) => {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            
            // Upload to Supabase 'results' table
            const { error } = await supabase.from('results').upsert(jsonData);
            if(!error) alert('Results uploaded successfully!');
            else console.error(error);
        };
        reader.readAsArrayBuffer(file);
    }

    async function studentLogin() {
        const adm = document.getElementById('stu-adm').value;
        const dob = document.getElementById('stu-dob').value;
        const { data, error } = await supabase.from('results').select('*').eq('admission_no', adm).eq('dob', dob).single();
        
        if(data) {
            renderResult(data);
            showSection('view-result');
        } else {
            alert('Student not found.');
        }
    }

    function renderResult(s) {
        const pct = (s.total_marks / s.max_possible) * 100;
        document.getElementById('result-sheet').innerHTML = `
            <h2 style="color:var(--navy)">RESULT SLIP</h2>
            <p><strong>Name:</strong> ${s.name} | <strong>Class:</strong> ${s.grade_level}</p>
            <table border="1">
                <tr><th>Subject</th><th>Marks</th></tr>
                <tr><td>English</td><td>${s.english}</td></tr>
                <tr><td>Maths</td><td>${s.maths}</td></tr>
                <!-- Dynamic subjects would go here -->
            </table>
            <div style="background:#eee; padding:10px; display:flex; justify-content:space-between">
                <span>Rank: ${s.rank}</span>
                <span>Percentage: ${pct.toFixed(2)}%</span>
            </div>
        `;
    }

    checkTimerStatus();
</script>
</body>
</html>
