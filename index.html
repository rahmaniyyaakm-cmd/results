<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result Portal | Rahmaniyya Public School</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-content">
            <h1>RAHMANIYYA PUBLIC SCHOOL</h1>
            <p>AKAMPADAM</p>
        </div>
    </header>

    <main>
        <div class="logo-watermark">
            <img src="your-logo-path.png" alt="School Logo">
        </div>

        <!-- Countdown Section -->
        <div id="timer-container" class="card">
            <h2>Results Announcement In:</h2>
            <div id="countdown">00:00:00:00</div>
        </div>

        <!-- Login Section (Initially Hidden until time reached) -->
        <div id="login-container" class="card hidden">
            <h2>Check Your Result</h2>
            <input type="text" id="studentId" placeholder="Admission Number">
            <input type="date" id="dob" placeholder="Date of Birth">
            <button onclick="viewResult()" class="btn-primary">View Result</button>
        </div>

        <!-- Result Display -->
        <div id="result-display" class="card hidden">
            <div id="printable-area">
                <!-- Result Content Generated by JS -->
            </div>
            <button onclick="window.print()" class="btn-secondary">Download PDF</button>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Rahmaniyya Public School Akampadam. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
